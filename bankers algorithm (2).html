<!DOCTYPE html>
<html>
<head>
<title>Banker's Algorithm Simulator</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#021f1f,#064e3b);
text-align:center;
padding:30px;
color:white;
}

.container{
background:#0f172a;
color:white;
padding:25px;
border-radius:15px;
box-shadow:0px 10px 25px rgba(0,0,0,0.6);
display:inline-block;
}

table{
border-collapse:collapse;
margin:auto;
margin-top:15px;
}

td,th{
border:1px solid #16a34a;
padding:6px;
}

th{
background:#16a34a;
color:white;
}

input{
width:50px;
text-align:center;
padding:4px;
background:#d1fae5;
border:2px solid #064e3b;
border-radius:5px;
font-weight:bold;
}

button{
margin:10px;
padding:10px 18px;
border:none;
border-radius:8px;
background:#16a34a;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#22c55e;
}

.safe{color:#22c55e;font-size:20px;font-weight:bold;}
.unsafe{color:#ef4444;font-size:20px;font-weight:bold;}

</style>
</head>

<body>

<h1>Banker's Algorithm Simulator</h1>

<div class="container">

Processes
<input type="number" id="processes" value="5">

Resources
<input type="number" id="resources" value="3">

<br><br>

<button onclick="generate()">Generate Tables</button>
<button onclick="findAvailable()">Find Available</button>
<button onclick="calculateNeed()">Calculate Need</button>
<button onclick="runBanker()">Run Safety Algorithm</button>
<button onclick="resetAll()">Reset</button>

<div id="tables"></div>

<div id="availableMatrix"></div>
<div id="needMatrix"></div>
<div id="result"></div>

<hr>

<h3>Resource Request Algorithm</h3>

Process ID
<input type="number" id="reqProcess" value="0">

<br><br>

Request Resources

<input type="number" id="req0">
<input type="number" id="req1">
<input type="number" id="req2">

<br><br>

<button onclick="resourceRequest()">Check Request</button>

<div id="requestResult"></div>

</div>

<script>

function moveNext(event){

if(event.key==="Enter"){

event.preventDefault()

let table = event.target.closest("table")

if(!table){
let inputs=document.querySelectorAll("input")
let index=Array.from(inputs).indexOf(event.target)
if(index<inputs.length-1) inputs[index+1].focus()
return
}

let cells=[...table.querySelectorAll("input")]
let index=cells.indexOf(event.target)

if(index>-1 && index<cells.length-1)
cells[index+1].focus()

}
}

function generate(){

let p=parseInt(processes.value)
let r=parseInt(resources.value)

let html=""

html+="<h3>Total Resources</h3>"

for(let j=0;j<r;j++)
html+=`R${j}: <input type="number" id="total${j}" value="10" onkeydown="moveNext(event)"> `

html+="<h3>Maximum Matrix</h3>"
html+="<table><tr><th>P</th>"

for(let j=0;j<r;j++)
html+=`<th>R${j}</th>`

html+="</tr>"

for(let i=0;i<p;i++){

html+=`<tr><td>P${i}</td>`

for(let j=0;j<r;j++)
html+=`<td><input type="number" id="max${i}${j}" value="0" onkeydown="moveNext(event)"></td>`

html+="</tr>"

}

html+="</table>"

html+="<h3>Allocation Matrix</h3>"
html+="<table><tr><th>P</th>"

for(let j=0;j<r;j++)
html+=`<th>R${j}</th>`

html+="</tr>"

for(let i=0;i<p;i++){

html+=`<tr><td>P${i}</td>`

for(let j=0;j<r;j++)
html+=`<td><input type="number" id="all${i}${j}" value="0" onkeydown="moveNext(event)"></td>`

html+="</tr>"

}

html+="</table>"

tables.innerHTML=html
}

function calculateAvailable(){

let p=parseInt(processes.value)
let r=parseInt(resources.value)

let total=[]
let available=[]

for(let j=0;j<r;j++)
total[j]=parseInt(document.getElementById(`total${j}`).value)

for(let j=0;j<r;j++){

let sum=0

for(let i=0;i<p;i++)
sum+=parseInt(document.getElementById(`all${i}${j}`).value)

available[j]=total[j]-sum

}

return available
}

function findAvailable(){

let p=parseInt(processes.value)
let r=parseInt(resources.value)

let html="<h3>Available Calculation</h3>"

for(let j=0;j<r;j++){

let total=parseInt(document.getElementById(`total${j}`).value)

let sum=0
let text=""

for(let i=0;i<p;i++){

let val=parseInt(document.getElementById(`all${i}${j}`).value)

sum+=val
text+=val+(i<p-1?" + ":"")

}

let available=total-sum

html+=`R${j}: ${total} - (${text}) = <b>${available}</b><br>`
}

availableMatrix.innerHTML=html
}

function calculateNeed(){

let p=parseInt(processes.value)
let r=parseInt(resources.value)

let html="<h3>Need Calculation</h3>"
html+="<table><tr><th>P</th>"

for(let j=0;j<r;j++)
html+=`<th>R${j}</th>`

html+="</tr>"

for(let i=0;i<p;i++){

html+=`<tr><td>P${i}</td>`

for(let j=0;j<r;j++){

let max=parseInt(document.getElementById(`max${i}${j}`).value)
let all=parseInt(document.getElementById(`all${i}${j}`).value)

let need=max-all

html+=`<td>${max} - ${all} = <b>${need}</b></td>`
}

html+="</tr>"
}

html+="</table>"

needMatrix.innerHTML=html
}

function runBanker(){

let p=parseInt(processes.value)
let r=parseInt(resources.value)

let available=calculateAvailable()

let allocation=[]
let need=[]

for(let i=0;i<p;i++){

allocation[i]=[]
need[i]=[]

for(let j=0;j<r;j++){

let max=parseInt(document.getElementById(`max${i}${j}`).value)
let all=parseInt(document.getElementById(`all${i}${j}`).value)

allocation[i][j]=all
need[i][j]=max-all

}
}

let work=[...available]
let finish=new Array(p).fill(false)
let safeSeq=[]

while(true){

let found=false

for(let i=0;i<p;i++){

if(!finish[i]){

let possible=true

for(let j=0;j<r;j++){

if(need[i][j]>work[j]){
possible=false
break
}

}

if(possible){

for(let j=0;j<r;j++)
work[j]+=allocation[i][j]

finish[i]=true
safeSeq.push("P"+i)
found=true

}

}

}

if(!found) break

}

let safe=true

for(let i=0;i<p;i++)
if(!finish[i]) safe=false

if(safe)
result.innerHTML=`<div class="safe">SAFE STATE<br>Safe Sequence: ${safeSeq.join(" → ")}</div>`
else
result.innerHTML=`<div class="unsafe">UNSAFE STATE</div>`
}

function resourceRequest(){

let p=parseInt(processes.value)
let r=parseInt(resources.value)

let process=parseInt(reqProcess.value)

let request=[req0.value,req1.value,req2.value].map(Number)

let available=calculateAvailable()

let allocation=[]
let need=[]

for(let i=0;i<p;i++){

allocation[i]=[]
need[i]=[]

for(let j=0;j<r;j++){

let max=parseInt(document.getElementById(`max${i}${j}`).value)
let all=parseInt(document.getElementById(`all${i}${j}`).value)

allocation[i][j]=all
need[i][j]=max-all

}
}

for(let j=0;j<r;j++){
if(request[j]>need[process][j]){
requestResult.innerHTML="<span class='unsafe'>Error: Request exceeds Need</span>"
return
}
}

for(let j=0;j<r;j++){
if(request[j]>available[j]){
requestResult.innerHTML="<span class='unsafe'>Resources not available</span>"
return
}
}

/* Temporary Allocation */

for(let j=0;j<r;j++){
available[j]-=request[j]
allocation[process][j]+=request[j]
need[process][j]-=request[j]
}

/* Safety Check */

let work=[...available]
let finish=new Array(p).fill(false)

while(true){

let found=false

for(let i=0;i<p;i++){

if(!finish[i]){

let possible=true

for(let j=0;j<r;j++){

if(need[i][j] > work[j]){
possible=false
break
}

}

if(possible){

for(let j=0;j<r;j++)
work[j]+=allocation[i][j]

finish[i]=true
found=true

}

}

}

if(!found) break

}

let safe=true

for(let i=0;i<p;i++)
if(!finish[i]) safe=false

if(safe)
requestResult.innerHTML="<span class='safe'>REQUEST GRANTED</span>"
else
requestResult.innerHTML="<span class='unsafe'>REQUEST DENIED (UNSAFE STATE)</span>"
}

function resetAll(){

tables.innerHTML=""
availableMatrix.innerHTML=""
needMatrix.innerHTML=""
result.innerHTML=""
requestResult.innerHTML=""

document.querySelectorAll("input").forEach(i=>i.value="")

}

generate()

</script>

</body>
</html>
